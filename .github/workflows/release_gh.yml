# Inlined from adafruit/workflows-circuitpython-libs/release-gh with Node 24
# action versions (checkout@v6, setup-python@v6). The upstream composite still
# pins Node 20 actions and emits deprecation warnings.

name: GitHub Release Actions

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  upload-release-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Translate Repo Name For Build Tools filename_prefix
        id: repo-name
        shell: bash
        run: |
          echo repo-name=$(
            echo ${{ github.repository }} |
            awk -F '\/' '{ print tolower($2) }' |
            tr '_' '-'
          ) >> $GITHUB_OUTPUT

      - name: Checkout Current Repo
        uses: actions/checkout@v6
        with:
          submodules: true
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Versions
        shell: bash
        run: |
          python3 --version

      - name: Checkout tools repo
        uses: actions/checkout@v6
        with:
          show-progress: false
          repository: adafruit/actions-ci-circuitpython-libs
          path: actions-ci

      - name: Install deps
        shell: bash
        run: |
          source actions-ci/install.sh

      - name: Build assets
        shell: bash
        run: |
          find . \( -name '__pycache__' -o -name '*.pyc' -o -name '.DS_Store' \) \
            -not -path './.git/*' -print -delete
          circuitpython-build-bundles \
            --filename_prefix ${{ steps.repo-name.outputs.repo-name }} \
            --library_location .

      - name: Verify mpy bundles
        shell: bash
        run: |
          echo "Built bundles:"
          ls -la bundles/
          shopt -s nullglob
          mpy_zips=(bundles/*-mpy-*.zip)
          if (( ${#mpy_zips[@]} == 0 )); then
            echo "::error::No *-mpy-*.zip bundles were produced"
            exit 1
          fi

      - name: Upload Release Assets
        uses: shogo82148/actions-upload-release-asset@v1
        with:
          asset_path: "bundles/*"
          github_token: ${{ secrets.GITHUB_TOKEN }}
          upload_url: ${{ github.event.release.upload_url }}
